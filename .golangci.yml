run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

# `defer x.Close()` / `defer tx.Rollback()` are universally treated as
# cleanup noise — Close/Rollback returning an error after the work is
# already done is not actionable. Excluding them via the issues.exclude
# regex (matches the linter's formatted message text) is the simplest
# project-wide fix.
issues:
  exclude:
    - 'Error return value of `[^`]+\.Close` is not checked'
    - 'Error return value of `[^`]+\.Rollback` is not checked'
