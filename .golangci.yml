run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  # `defer x.Close()` / `defer tx.Rollback()` are universally treated as
  # cleanup noise — Close/Rollback returning an error after the work is
  # already done isn't actionable. Explicitly excluding the pattern is
  # the conventional Go fix (https://github.com/kisielk/errcheck#excluding-functions).
  exclude-rules:
    - linters: [errcheck]
      source: '^\s*defer .*\.(Close|Rollback)\(\)'
