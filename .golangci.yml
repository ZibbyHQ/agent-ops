run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

# `defer x.Close()` / `defer tx.Rollback()` are universally treated as
# cleanup noise — Close/Rollback returning an error after the work is
# already done isn't actionable. Match by linter + message text so the
# filter is unambiguously scoped to errcheck output.
issues:
  exclude-rules:
    - linters: [errcheck]
      text: 'Error return value of `[^`.]+\.Close` is not checked'
    - linters: [errcheck]
      text: 'Error return value of `[^`.]+\.Rollback` is not checked'
