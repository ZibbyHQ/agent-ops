# Example config — Node.js application host, stack auto-discovered.
#
# Drop this in /etc/agent-ops/config.yaml when your host runs one or more
# Node.js applications. The agent discovers your specific setup on first
# boot rather than assuming PM2 / nginx / a particular port:
#
#   - the Node process(es) running on the box and how they're managed
#     (PM2 / systemd / docker / forever / bare nohup)
#   - the reverse proxy (nginx / apache / caddy / none — direct-bound)
#   - the public URL + the upstream port the Node app listens on
#   - the app's working directory (so npm audit can run against it)
#
# State cached at /var/lib/agent-ops/discovered-stack.json. Re-discovery
# auto-fires if file is missing or > 7 days old.
#
# Cost expectations (USD, ANTHROPIC_API_KEY billing):
#   - discover_stack (Sonnet, once + every 7d):   ~$0.05–0.15 / run
#   - liveness_check (Haiku, state-driven, hourly): ~$0.05–0.10 / run
#   - system_health  (Haiku, hourly):             ~$0.02–0.05 / run
#   - daily_audit    (Sonnet):                    ~$0.05–0.15 / run
#   - weekly_security_patch (Sonnet):             ~$0.10–0.30 / run
# Typical total at this cadence: ~$2–4 / day.
#
# After copying:
#   1. `sudo agent-ops restart` — discover_stack runs once before the
#      first liveness_check.
#   2. (Optional) Set AGENT_OPS_NOTIFY_WORKFLOW_ID for Lark / Slack pings.
#   3. (Optional) If you want to constrain it ("only manage the app named
#      api, ignore staging") edit the discover_stack prompt below.

state_dir: /var/lib/agent-ops

agent:
  provider: claude-cli
  model: claude-haiku-4-5-20251001    # cheap default — routine cron checks
  api_key_env: ANTHROPIC_API_KEY      # ignored when provider=claude-cli
  max_tool_calls_per_task: 40         # bumped for discovery — bounded below
  task_timeout: 15m

mcp:
  listen_addr: "127.0.0.1:7842"
  token_env: AGENT_OPS_TOKEN

# First-run discovery. Runs ONCE on initial daemon start (re-invokable via
# MCP `agent_run_now task_name=discover_stack`). Writes the state file
# every other schedule reads.
bootstrap:
  name: discover_stack
  model: claude-sonnet-4-6
  prompt: |
    You are taking over a Linux host running one or more Node.js
    applications. Your job is ONE-SHOT discovery: figure out what's
    here and write structured JSON to
    /var/lib/agent-ops/discovered-stack.json. Every future scheduled
    check reads it.

    Discover (via the shell tool — do NOT assume PM2 / nginx / a
    particular APP_NAME / port):

      1. How is the Node app managed? Check in this order:
           a. PM2: `command -v pm2 && pm2 jlist 2>/dev/null` — if it
              returns a non-empty JSON array, the process_manager is
              "pm2". Capture each app's name + pm2_env.pm_exec_path +
              pm2_env.exec_interpreter.
           b. systemd: `systemctl list-units --type=service --state=running
              --no-pager | grep -iE 'node|npm|nest|next|express'` — look
              for units running node. Also `systemctl list-units
              | grep -E '\.service.*node'`.
           c. docker: `docker ps --format '{{.Names}} {{.Image}} {{.Ports}}'
              2>/dev/null | grep -iE 'node|api|web'` — if any.
           d. bare process: `ps -eo pid,user,cmd | grep -E
              '^\s*[0-9]+ [^ ]+ /[^ ]*node ' | grep -v grep`.

      2. Which port(s) does the Node app(s) listen on?
           `ss -ltnp | grep -E 'node|nodejs'`
         For each found, note the port. Cross-reference with the
         process-manager info from step 1 to associate port → app name.

      3. Reverse proxy? `ss -ltnp | grep -E ':(80|443) '`. If
         nginx/apache/caddy/traefik is on :80/:443, identify the unit.
         Parse its config to confirm it proxies to the Node port(s).
         If nothing on :80/:443 OR the Node app itself is bound there,
         there's no reverse proxy.

      4. App working directory(ies): for each PM2 app, pm2_env.pm_cwd.
         For systemd units, `systemctl show -p WorkingDirectory <unit>`.
         For docker, `docker inspect <name> --format '{{.Config.WorkingDir}}'`.
         Bare: derive from /proc/<pid>/cwd. The CWD is what `npm audit`
         needs to run against.

      5. Public URL: parse the reverse proxy config for
         server_name / ServerName. If no proxy and the Node app is
         direct-bound, use `http://<hostname>:<app_port>/` (or the
         first TLS-terminated origin you find).

      6. Distro:
           `. /etc/os-release && echo "$ID $ID_LIKE"`
         Set pkg_manager to: apt, dnf, yum, apk, zypper.

    Then write the file. `mkdir -p /var/lib/agent-ops` first. Shape:

      {
        "process_manager": "pm2",
        "apps": [
          {
            "name": "api",
            "port": 3000,
            "cwd": "/var/www/api",
            "restart_cmd": "pm2 restart api",
            "reload_cmd": "pm2 reload api",
            "status_cmd": "pm2 jlist | jq -r '.[] | select(.name==\"api\") | .pm2_env.status'",
            "logs_cmd": "pm2 logs api --lines 200 --nostream"
          }
        ],
        "web_server": "nginx",
        "web_server_unit": "nginx.service",
        "web_reload_cmd": "systemctl reload nginx",
        "web_restart_cmd": "systemctl restart nginx",
        "site_url": "https://example.com/healthz",
        "distro": "ubuntu",
        "pkg_manager": "apt",
        "discovered_at": "2026-05-31T12:34:56Z"
      }

    Adapt the `restart_cmd` / `reload_cmd` / `status_cmd` / `logs_cmd`
    to the process_manager you discovered:
      - pm2:     `pm2 restart <name>` / `pm2 reload <name>` /
                 `pm2 jlist | jq …` / `pm2 logs <name>`
      - systemd: `systemctl restart <unit>` / `systemctl reload <unit>` /
                 `systemctl is-active <unit>` / `journalctl -u <unit> -n 200`
      - docker:  `docker restart <name>` / `docker restart <name>` /
                 `docker inspect -f '{{.State.Status}}' <name>` /
                 `docker logs --tail 200 <name>`
      - bare:    leave restart_cmd "" (operator-only), status_cmd
                 `pgrep -f '<cmd-pattern>'`.

    Write with `cat > /var/lib/agent-ops/discovered-stack.json <<'JSON' …`
    so the JSON appears in the log. Echo the file at the end.

    Hard constraints:
      - Be thorough but BOUNDED. Don't `find /`. Don't follow symlinks
        beyond depth 4.
      - Autonomous — pick sensible defaults. Empty fields beat wrong
        ones.
      - If `web_server` ends up empty (no reverse proxy), liveness
        will still curl the site_url directly.
  verify_prompt: |
    The previous agent claimed to write
    /var/lib/agent-ops/discovered-stack.json. Independently verify:
      1. File exists and is valid JSON.
      2. `process_manager` and `pkg_manager` are non-empty.
      3. `apps` is a non-empty array; each entry has non-empty `name`
         and `port`.
      4. At least one app's `status_cmd` is non-empty.
    Return STRICT JSON only:
      {"pass": bool, "evidence": "<one-line>", "fail_reason": "<empty or one-line>"}
  verify_model: claude-haiku-4-5-20251001
  tools: [shell]

schedules:
  # ─── Hourly: app + reverse-proxy liveness with auto-heal ────────────
  - name: liveness_check
    cron: "0 * * * *"
    prompt: |
      Verify the host stack is healthy. Autonomous, use shell tool only.

      Build ONE shell command that:
        - reads /var/lib/agent-ops/discovered-stack.json (you can pipe to
          jq or parse with awk; if jq is absent fall back to grep + sed)
        - checks `systemctl is-active` for the web server unit + db unit
        - runs the db's ping command
        - curls every site in `sites` with a non-empty `url` and captures
          its HTTP status
        - prints exactly one line per check:
            "<check>: <ok|failed>: <one-line evidence>"

      Run that bash ONCE. Don't break it into multiple turns. Don't
      reason about the result inside the LLM — just look at the output.

      THEN, only if anything reported "failed":
        - web server failed → `web_restart_cmd` from state, re-check that
          one check (NOT the whole bash again).
        - db failed → `systemctl restart <db_unit>`, re-check that one.
        - a site failed → `web_reload_cmd`, re-check that one site.
      Each recovery is exactly ONE more shell turn. Append " (recovered)"
      to its line if it came back to ok. Stop after one recovery attempt
      per check.

      State file mtime > 7 days OR missing → emit one line
      "discovery: stale" and STOP. The hourly schedule will re-fire and
      the next system_health run will re-discover; do NOT re-discover
      inline here (that would blow our budget).

      Final answer = the line-per-check output (with " (recovered)"
      where applicable). No prose. No tables. No markdown headers.
      Aim for under 6 shell turns total.

      Notification: if a check fails after recovery AND a notify tool
      is available in your toolbelt (look for names ending in
      `_trigger_workflow`, `_post_message`, `_create_incident`, etc.),
      call it with a one-line failure summary. Otherwise just log.
    tools: [shell]

  # ─── Hourly: deeper system health (memory, disk, crash-loops) ────────
  - name: system_health
    cron: "0 * * * *"
    prompt: |
      Diagnose host vitals + self-heal common housekeeping issues.
      Autonomous, no questions.

      Read /var/lib/agent-ops/discovered-stack.json. If missing or > 7d
      old, re-discover first.

      Inspect (read-only first, then act):
        - `free -m`. If MemAvailable < 100 MB AND a single Node worker
          dominates RSS (`ps -eo pid,rss,cmd --sort=-rss | grep node
          | head -3`): run that app's `reload_cmd` (graceful — pm2
          reload / systemctl restart). Re-check.
        - `df -h /`. If / >= 90% used:
            * If process_manager=pm2: `pm2 flush` (each app's logs).
            * Rotate web server logs (web_server_unit from state):
              `logrotate -f /etc/logrotate.d/<web_server>` if present.
            * Distro-aware cache clean: `apt-get clean` (apt) /
              `dnf clean all` (dnf/yum) / `apk cache clean` (apk).
            * If still >= 85%, enumerate top 10 largest dirs under
              /home, /var/log/, /var/lib/docker (if docker), and each
              app's `cwd` — REPORT only, do not delete.
        - Crash-loop check: for each app, parse `status_cmd` output OR
          (pm2 only) `pm2 jlist | jq -r '.[] | select(.name==
          "<name>") | .pm2_env.restart_time'`. Track in
          /var/lib/agent-ops/restart-counter.json (keyed by app name).
          If the count grew by > 5 since the last hourly run: the app
          is in a crash loop. Capture last 200 lines from the app's
          `logs_cmd` and NOTIFY — do NOT keep restarting; the operator
          needs to see the trace.
        - `top -bn1 | head -20`. If a single node worker is > 80% CPU
          for the snapshot AND remains so after 30s (sample twice),
          capture PID + cmdline and NOTIFY. Don't kill — could be
          legitimate batch work.

      Report one line per check + any actions. Notify on any action OR
      unresolved high-severity finding.
    tools: [shell]

  # ─── Daily 02:30: dependency audit + cert + log housekeeping ────────
  - name: daily_audit
    cron: "30 2 * * *"
    model: claude-sonnet-4-6
    prompt: |
      Daily audit. Autonomous, no questions.

      Read /var/lib/agent-ops/discovered-stack.json for apps[*].cwd
      and web reload command. If missing / > 7d old, re-discover.

      Dependency audit (read-only):
        For each app's `cwd`:
          - `cd <cwd> && npm audit --json --omit=dev 2>/dev/null` (or
            `pnpm audit --json` / `yarn npm audit --json` — try each).
          - Parse JSON; report advisories of severity "high" or
            "critical" with package name, severity, and fix
            recommendation. Do NOT run `npm audit fix` — dependency
            upgrades are an operator decision.

      SSL cert renewal (discover the tool — don't assume certbot):
        - `command -v certbot acme.sh lego dehydrated 2>/dev/null`.
        - If certbot: `certbot certificates 2>&1`. For each cert with
          VALID DAYS < 21: `certbot renew --quiet --post-hook
          "<web_reload_cmd>"` and re-verify.
        - acme.sh: `acme.sh --list` + `acme.sh --renew-all` for near-
          expiry.
        - None found + sites on HTTPS: report "no cert tool detected —
          renewals are external (CDN / LB)" as info.

      Log + state housekeeping:
        - process_manager=pm2: `pm2 jlist | jq -r '.[] |
          .pm2_env.pm_out_log_path'` — `pm2 flush <name>` any log
          > 500 MB. Also confirm `~pm2/.pm2/dump.pm2` exists — if not,
          `pm2 save`.
        - process_manager=systemd: `journalctl --disk-usage` — if
          > 1 GB, `journalctl --vacuum-time=14d`.
        - process_manager=docker: `docker system df` — if Reclaimable
          > 2 GB, `docker system prune -f` (no -a — keeps images in use).

      Report findings + actions. Notify on any high/critical advisory
      OR failure.
    tools: [shell]

  # ─── Weekly Sunday 04:00: OS security updates ───────────────────────
  - name: weekly_security_patch
    cron: "0 4 * * 0"
    model: claude-sonnet-4-6
    prompt: |
      Apply OS security updates ONLY. Autonomous, conservative.
      Do NOT touch npm dependencies — those are an explicit operator
      call.

      Read /var/lib/agent-ops/discovered-stack.json for `pkg_manager`,
      `web_server_unit`, apps[*]. If missing / > 7d old, re-discover.

      Branch by pkg_manager:
        apt:    `apt-get update && apt list --upgradable 2>/dev/null
                | grep -i '\-security'` → upgrade just those with
                `apt-get -y -o Dpkg::Options::="--force-confold"
                upgrade <pkgs>`.
        dnf:    `dnf -y update --security`
        yum:    `yum -y --security update`
        apk:    `apk upgrade --no-cache`  (Alpine doesn't separate)
        zypper: `zypper -n patch --category security`

      Snapshot package list to /var/log/agent-ops/pre-patch-$(date +%F).list
      first (mkdir -p if needed).

      After upgrade:
        - `web_reload_cmd` (if web_server present).
        - For each app, run its `reload_cmd` (graceful) — pm2 reload /
          systemctl restart / docker restart as appropriate.
        - Re-run liveness: status_cmd + curl <site_url>. If anything
          broken: report stack trace + STOP, escalate. Do NOT roll back
          automatically.
        - If `/var/run/reboot-required` exists (Debian/Ubuntu) OR
          `needs-restarting -r` (RHEL family) says yes: notify operator.
          Do NOT reboot automatically.
    tools: [shell]
