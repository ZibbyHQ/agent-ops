# Example config — single-app web host, stack auto-discovered.
#
# Drop this in /etc/agent-ops/config.yaml when ONE web application sits on
# the host — could be WordPress, a static site, Ghost, a Python/Django
# app, anything. The agent discovers your specific stack on first boot
# rather than assuming a particular web server or data store.
#
# What it figures out:
#   - the public-facing reverse proxy / web server (nginx / apache / caddy
#     / openlitespeed / none — direct-bound)
#   - the actual app process (php-fpm / node / python / gunicorn / ruby /
#     a generic systemd unit)
#   - whether a data store is present locally (mysql / mariadb / postgres
#     / redis / sqlite / none)
#   - the site's public URL
#
# State is cached at /var/lib/agent-ops/discovered-stack.json. Re-discovery
# runs if that file is missing or > 7 days old.
#
# Cost expectations (USD, ANTHROPIC_API_KEY billing):
#   - discover_stack (Sonnet, once + every 7d):  ~$0.05–0.15 / run
#   - liveness_check (Haiku, state-driven, hourly): ~$0.05–0.10 / run
#   - nightly_backup_audit (Sonnet):              ~$0.05–0.15 / run
#   - weekly_security_update (Sonnet):            ~$0.10–0.30 / run
# Typical total: ~$2–4 / day. Bump cadence (e.g. */15 liveness) for
# tighter MTTR — adds ~$3–5/day at */15.
#
# After copying:
#   1. `sudo agent-ops restart` — discover_stack runs once before
#      the first hourly_health_check fires.
#   2. (Optional) Set AGENT_OPS_NOTIFY_WORKFLOW_ID to wire Lark / Slack
#      pings; without it the agent self-heals + logs but doesn't reach
#      out on unrecoverable failures.

state_dir: /var/lib/agent-ops

agent:
  provider: claude-cli
  model: claude-sonnet-4-6
  api_key_env: CLAUDE_CODE_OAUTH_TOKEN
  max_tool_calls_per_task: 40         # bumped for discovery — bounded below
  task_timeout: 15m

mcp:
  listen_addr: ":7842"
  token_env: AGENT_OPS_TOKEN

# First-run discovery. Runs ONCE on initial daemon start (re-invokable via
# MCP `agent_run_now task_name=discover_stack`). Writes the state file
# every other schedule reads.
bootstrap:
  name: discover_stack
  model: claude-sonnet-4-6
  prompt: |
    You are taking over a Linux host running a single web application.
    Your job is ONE-SHOT discovery: figure out what's actually here and
    write structured JSON to /var/lib/agent-ops/discovered-stack.json.
    Every future scheduled check will read it.

    Discover (via the shell tool — do NOT assume `nginx` / `mysql` /
    specific paths exist):

      1. What's listening publicly? Try:
           `ss -ltnp | grep -E ':(80|443) '`
         Identify the unit / process bound to :80 / :443. That's the
         user-facing entry point (could be nginx, apache, caddy,
         openlitespeed, traefik, OR the app process direct-bound).

      2. Is there an upstream app process behind it? If the public
         listener is a reverse proxy (nginx/apache/caddy/traefik), the
         real app is on a higher port. Try:
           `ss -ltnp | grep -vE ':(22|80|443|7842) '` for non-system
           listeners + identify them.
         Note unit name(s), the listening port, and a friendly app type
         (php-fpm, node, gunicorn, uvicorn, ruby, go binary, …).

      3. Public URL: parse the reverse proxy config for ServerName /
         server_name / hostname. For apache: `apache2ctl -S 2>&1` (or
         `httpd -S 2>&1`). Nginx: `nginx -T 2>&1 | grep -E
         'server_name|listen'`. Caddy: `cat /etc/caddy/Caddyfile
         2>/dev/null`. Pick the first non-default host. If only one
         site, that's your URL — prefer `https://` if cert present.

      4. Data store: scan for local DB engines:
           `systemctl list-units --type=service --state=running --no-pager \
              | grep -iE 'mysql|mariadb|postgres|redis|mongo'`
         and `ss -ltn | grep -E ':(3306|5432|6379|27017) '`
         Pick one (the primary). If none, set "db_engine": "" and
         "db_unit": "" — the app may use SQLite (look for a *.sqlite
         file in the docroot if known) or be stateless.

      5. Distro family (for the weekly patch task):
           `. /etc/os-release && echo "$ID $ID_LIKE"`
         Set pkg_manager to one of: apt, dnf, yum, apk, zypper.

    Then write the file. `mkdir -p /var/lib/agent-ops` first. Shape:

      {
        "web_server": "nginx",
        "web_server_unit": "nginx.service",
        "web_reload_cmd": "systemctl reload nginx",
        "web_restart_cmd": "systemctl restart nginx",
        "app_type": "php-fpm",
        "app_unit": "php8.2-fpm.service",
        "app_port": 9000,
        "app_restart_cmd": "systemctl restart php8.2-fpm",
        "db_engine": "mysql",
        "db_unit": "mysql.service",
        "db_ping_cmd": "mysqladmin ping",
        "site_url": "https://example.com/",
        "distro": "ubuntu",
        "pkg_manager": "apt",
        "discovered_at": "2026-05-31T12:34:56Z"
      }

    Write with `cat > /var/lib/agent-ops/discovered-stack.json <<'JSON' …`
    so the JSON appears in the log. Echo the final file at the end of
    your run.

    Hard constraints:
      - Be thorough but BOUNDED. Don't `find /`. Don't follow symlinks
        beyond depth 4.
      - You are autonomous. Pick sensible defaults; leave a field "" if
        genuinely unknown — better empty than wrong.
  verify_prompt: |
    The previous agent claimed to write
    /var/lib/agent-ops/discovered-stack.json. Independently verify:
      1. File exists and is valid JSON.
      2. `web_server_unit` and `pkg_manager` are non-empty.
      3. `systemctl cat <web_server_unit> >/dev/null 2>&1` exits 0.
      4. At least one of `site_url` or `web_server` is non-empty.
    Return STRICT JSON only:
      {"pass": bool, "evidence": "<one-line>", "fail_reason": "<empty or one-line>"}
  verify_model: claude-haiku-4-5-20251001
  tools: [shell]

schedules:
  - name: liveness_check
    cron: "0 * * * *"
    prompt: |
      Verify the host stack is healthy. Autonomous, use shell tool only.

      Build ONE shell command that:
        - reads /var/lib/agent-ops/discovered-stack.json (you can pipe to
          jq or parse with awk; if jq is absent fall back to grep + sed)
        - checks `systemctl is-active` for the web server unit + db unit
        - runs the db's ping command
        - curls every site in `sites` with a non-empty `url` and captures
          its HTTP status
        - prints exactly one line per check:
            "<check>: <ok|failed>: <one-line evidence>"

      Run that bash ONCE. Don't break it into multiple turns. Don't
      reason about the result inside the LLM — just look at the output.

      THEN, only if anything reported "failed":
        - web server failed → `web_restart_cmd` from state, re-check that
          one check (NOT the whole bash again).
        - db failed → `systemctl restart <db_unit>`, re-check that one.
        - a site failed → `web_reload_cmd`, re-check that one site.
      Each recovery is exactly ONE more shell turn. Append " (recovered)"
      to its line if it came back to ok. Stop after one recovery attempt
      per check.

      State file mtime > 7 days OR missing → emit one line
      "discovery: stale" and STOP. The hourly schedule will re-fire and
      the next system_health run will re-discover; do NOT re-discover
      inline here (that would blow our budget).

      Final answer = the line-per-check output (with " (recovered)"
      where applicable). No prose. No tables. No markdown headers.
      Aim for under 6 shell turns total.

      Notification: only if a check is "failed" after a recovery
      attempt AND `command -v zibby >/dev/null`, shell-out once to
      `zibby workflow trigger $AGENT_OPS_NOTIFY_WORKFLOW_ID
      --input severity=high --input msg="<failed line>"`.
    tools: [shell]

  - name: nightly_backup_audit
    cron: "30 3 * * *"
    prompt: |
      Nightly: verify a recent backup exists. Autonomous, no questions.

      Read /var/lib/agent-ops/discovered-stack.json for db_engine. If
      state is missing or > 7d old, re-discover db_engine first.

      Discover the backup job — do NOT assume mysqldump or any
      particular path:
        - `crontab -l 2>/dev/null; ls /etc/cron.d/ /etc/cron.daily/
          /etc/cron.hourly/ 2>/dev/null` — grep for mysqldump, pg_dump,
          restic, borg, duplicity, rsnapshot, wp-cli backup, etc.
        - Note the output path the job writes to.

      Verify:
        - Newest backup file in that path is < 26 hours old AND > 1 MB.
        - Spot-check integrity: `gunzip -t <newest>.gz` succeeds for
          gzipped dumps; `restic snapshots` for restic; `tar tzf` for
          tarballs.
        - If NO backup job is configured at all, report that as a
          high-severity finding and notify — running a web app with no
          backups is the #1 ops failure mode.

      Report findings + actions.
    tools: [shell]

  - name: weekly_security_update
    cron: "0 4 * * 0"      # Sundays 04:00 UTC
    prompt: |
      Apply OS security updates ONLY. Autonomous, conservative.

      Read /var/lib/agent-ops/discovered-stack.json for `pkg_manager`,
      `web_server_unit`, `app_unit`, `db_unit`, `site_url`. If state
      missing or > 7d old, re-discover first.

      Branch by pkg_manager:
        apt:    `apt-get update && apt list --upgradable 2>/dev/null
                | grep -i '\-security'` → if any, upgrade just those.
        dnf:    `dnf -y update --security`
        yum:    `yum -y --security update`
        apk:    `apk upgrade --no-cache` (Alpine doesn't separate)
        zypper: `zypper -n patch --category security`

      Snapshot package list to /var/log/agent-ops/pre-patch-$(date +%F).list
      before upgrading (mkdir -p first).

      After upgrade:
        - Reload/restart web + app + db units from state file.
        - `curl -sk -o /dev/null -w "%{http_code}" -m 8 <site_url>` —
          confirm site still returns 2xx/3xx. If broken: report stack
          trace + STOP, escalate to operator. Do NOT roll back
          automatically.
        - If `/var/run/reboot-required` exists OR `needs-restarting -r`
          says yes: notify operator. Do NOT reboot automatically.
    tools: [shell]
