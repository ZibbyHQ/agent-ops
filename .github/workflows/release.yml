name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # release assets
  packages: write       # ghcr push

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # GITHUB_TOKEN can write GitHub Releases on this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN: a fine-grained PAT with write access to
          # ZibbyHQ/homebrew-tap. Goreleaser needs cross-repo push to land
          # the cask update. Add via repo Settings → Secrets and variables
          # → Actions BEFORE pushing the first tag, otherwise the release
          # still ships binaries (Linux/Mac tarballs + .deb) but the brew
          # tap update step fails. Safe to retry by re-running the job
          # after the secret is added.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          # amd64 only — Fargate prod uses amd64; arm64 multi-arch QEMU
          # build adds ~5min and was flaking under @anthropic-ai/claude-code
          # npm install on the arm64 leg. Add arm64 back once we need it.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/zibbyhq/agent-ops:${{ steps.ver.outputs.version }}
            ghcr.io/zibbyhq/agent-ops:latest
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
