name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go version
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test -race -count=1 ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      # Hydrate the module cache + actually compile once so golangci-lint's
      # typecheck phase doesn't choke on unresolved imports. The default
      # binary install of golangci-lint-action doesn't run any Go commands
      # before lint, and our project apparently has a shape where the lint
      # binary's own resolver alone can't find third-party packages —
      # `go build` triggers normal toolchain resolution and primes the
      # caches that lint then reuses.
      - run: go mod download
      - run: go build ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          args: --timeout=5m
          skip-cache: true

  mcp-bridge:
    name: mcp-bridge (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    defaults:
      run:
        working-directory: clients/mcp-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: node --version
      - run: npm test

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: agent-ops:ci
          build-args: |
            VERSION=ci-${{ github.sha }}
