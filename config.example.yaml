# agent-ops example configuration.
#
# Mount this at /etc/agent-ops/config.yaml in the container (or pass
# --config /path/to/config.yaml to agent-opsd).

state_dir: /var/lib/agent-ops

agent:
  # Two Claude providers:
  #   "claude"     — direct REST API. Auth via x-api-key. Reads
  #                  ANTHROPIC_API_KEY env. Bills against Anthropic API credit
  #                  balance (separate from Claude.ai / Claude Code).
  #   "claude-cli" — subprocess to the `claude` Code CLI binary
  #                  (bundled in the official Docker image). Auth via
  #                  CLAUDE_CODE_OAUTH_TOKEN. Bills against the user's
  #                  Claude.ai / Claude Code subscription.
  # Pick "claude-cli" when wrapping the daemon inside a tenant container
  # whose owner already pays for Claude — no separate API billing needed.
  provider: claude
  # `agent.model` is the daemon-wide default. Each schedule (and `bootstrap`)
  # may override with its own `model:` value — cheap routine cron checks
  # stay on Haiku, install/upgrade/incident-response tasks that need real
  # reasoning bump up to Sonnet. The override order is:
  #   per-task `model:` (schedule or bootstrap) → agent.model (this line).
  model: claude-haiku-4-5-20251001
  api_key_env: ANTHROPIC_API_KEY    # ignored when provider=claude-cli
  max_tool_calls_per_task: 25
  # Bumped from 10m to 20m: bootstrap tasks like "install n8n" can hit
  # 5-10 min on slow npm CDN days plus Claude API latency; the LLM also
  # sometimes pauses mid-think waiting on Anthropic. Bumping gives those
  # one-shot installs room to complete instead of getting SIGKILL'd.
  task_timeout: 20m

mcp:
  listen_addr: ":7842"
  # Bearer token is read from this env var if set; otherwise generated on
  # first boot and persisted at <state_dir>/mcp.token.
  token_env: AGENT_OPS_TOKEN

# Optional first-run task. Runs ONCE on initial daemon boot — use this to
# set up the host app (download binaries, seed DB, configure ports, etc.).
# Subsequent restarts skip it; you can re-trigger via MCP agent_run_now.
bootstrap:
  name: initial_setup
  prompt: |
    Install + start the target app, verify it responds. Show curl
    output as evidence of the app being alive.
  # Bootstrap genuinely needs to reason about install errors, package
  # mismatches, port conflicts — bump to Sonnet over the Haiku default.
  model: claude-sonnet-4-6
  # OPTIONAL verifier pass. After the main bootstrap claims success, a
  # second agent independently re-checks the work via shell and emits
  # strict JSON. If `pass: false`, the daemon does NOT write the
  # bootstrap.done marker, so a container restart re-runs the install.
  # Use a cheap model — the verifier just runs `ps` + `curl` and decides.
  verify_prompt: |
    The previous agent claimed to install + start the application.
    Independently verify by running the shell tool:
      - ps shows the app process
      - curl on the expected port returns a non-error response
    Return STRICT JSON only (no prose): {"pass": bool, "evidence": "<one-line summary>", "fail_reason": "<empty or one-line>"}
  verify_model: claude-haiku-4-5-20251001
  tools: [shell]

# Recurring tasks. Each one fires on its cron expression. Edit names + prompts
# to taste — agent-ops will reconcile on restart.
#
# Tool allowlist:
#   - `shell` — POSIX shell on the host. Always available.
#
# Vendor integrations (Slack notify, page on-call, open Jira, etc.) are
# done by installing the vendor CLI in a flavoured image and letting the
# agent shell-out to it. The reference example is the Zibby flavour image
# which adds `@zibby/cli`; the agent runs `zibby workflow trigger <id>`
# via the shell tool. Single source of truth, no Go-side drift twin.
schedules:
  - name: hourly_health_check
    cron: "0 * * * *"
    # No `model:` → inherits the agent.model default (Haiku). "Is the app
    # still alive?" is a cheap binary check that doesn't need Sonnet.
    prompt: |
      Verify the application is responding on its expected port.
      If it's down, try `pkill -SIGHUP <process>` to soft-restart and
      re-check. If the soft restart doesn't bring it back, shell-out to
      your notification CLI (e.g. on Zibby flavour images:
        zibby workflow trigger notify-app-down \
          --input instance_id="$INSTANCE_ID" \
          --input error="<one-line summary>" \
          --input severity="high"
      ) so the operator gets paged. Report status.
    tools: [shell]

  - name: weekly_upgrade
    cron: "0 9 * * 1"        # Mondays 09:00 UTC
    # Upgrades involve rollback decisions, smoke-test interpretation, and
    # release-note reading — escalate to Sonnet over the Haiku default.
    model: claude-sonnet-4-6
    prompt: |
      Check upstream for a new release of the host application.
      If one exists:
        1. Snapshot current state (or note rollback procedure).
        2. Pull the new version.
        3. Run smoke tests.
        4. If anything fails, roll back and explain what went wrong.
           Then shell-out to your notification CLI (e.g. on Zibby flavour
           images: `zibby workflow trigger notify-upgrade-failed
           --input error="…"`) so the on-call sees it.
        5. If everything passes, summarize what changed.
    tools: [shell]
